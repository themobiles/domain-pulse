name: Generate Access Statistics Chart

on:
  schedule:
    # 毎日JST午前0時 (UTC 15:00) に自動実行
    - cron: '0 15 * * *'
  workflow_dispatch:
    # 手動実行可能

permissions:
  contents: write # リポジトリへの書き込み（自動プッシュ）権限

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests matplotlib

    - name: Generate access statistics chart
      env:
        STATS_API_KEY: ${{ secrets.STATS_API_KEY }}
      run: |
        python scripts/generate_charts.py

    - name: Commit and Push changes
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "chore: auto-update access statistics chart [skip ci]"
        file_pattern: 'charts/stats.png'
        commit_user_name: github-actions[bot]
        commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com
